# CI for the chezmoi dotfiles repo (TESTING.md §3/§8).
#   tier-a (ubuntu): hermetic render matrix, lint, packages.yaml schema,
#     upstream existence, deprecation/abandonment audit, leak scan.
#   tier-b (macos): desired-state CVE scan of the rendered Brewfile at LATEST
#     versions via `brew vulns` (core command) — high/critical gate the build.
# Daily cron: deprecations and CVEs drift without any repo change.
# Actions are SHA-pinned (supply-chain hygiene).
name: tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 13 * * *" # daily ~9am ET
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tier-a:
    name: hermetic + package checks
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }} # gh api (abandonment checks)
      # Leak scan is authoritative only when these repo secrets exist;
      # unset -> the scan self-skips (values come from 1Password locally).
      WORK_USER: ${{ secrets.WORK_USER }}
      WORK_COMPANYNAME: ${{ secrets.WORK_COMPANYNAME }}
      WORK_DOMAIN: ${{ secrets.WORK_DOMAIN }}
      # On PRs, audit packages ADDED relative to the base branch.
      AUDIT_BASE: ${{ github.event.pull_request.base.sha || 'HEAD' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # AUDIT_BASE diffing needs history
      - name: Install chezmoi + fish
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          sudo apt-get update -q
          sudo apt-get install -y -q fish
      - name: Run test suite
        # prune-guard omitted: it compares against installed brew state,
        # which only exists on the real machines (in-apply preflight).
        run: ./tests/run.sh schema render lint exist security leak

  tier-b:
    name: CVE scan (desired state)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install tooling
        # `brew vulns` is a built-in command (merged into brew core; the
        # homebrew/brew-vulns tap is archived) — nothing to install for it.
        run: brew install yq
      - name: Render Brewfile (declared set, latest versions)
        # Tapped tokens (vendor/tap/name) are dropped: their taps aren't on the
        # runner (nettleton/tap is private and never can be), and brew vulns
        # hard-fails on unresolvable names. Tapped formulae are covered by the
        # local A7 audit and the safe-install gate instead.
        run: |
          ./tests/lib/render_brewfile.sh --personal \
            | grep -E '^(brew|cask) ' | grep -vE '"[^"]*/' > Brewfile.ci
          wc -l Brewfile.ci
      - name: Chunked CVE scan (brew vulns, batched for OSV timeouts)
        id: scan
        run: |
          set +e
          ./tests/lib/ci_cve_scan.sh Brewfile.ci .
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # 0 clean · 1 findings (gate at the end) · 2 scan errors — fail here
          [ "$rc" -le 1 ]
      - name: Upload CVE findings
        # always(): the interesting case is a FAILING gate, so upload even then.
        if: always() && hashFiles('cve-findings.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cve-findings
          path: cve-findings.json
          if-no-files-found: ignore
      - name: Gate on high/critical findings
        if: steps.scan.outputs.rc == '1'
        run: |
          echo "::error::high/critical CVEs in the declared set at latest versions (see the 'High/critical findings' list in the scan step, or the cve-findings.json artifact)"
          exit 1
