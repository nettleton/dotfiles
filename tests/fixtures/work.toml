  gitlab_internal = "op://fixture/gl-internal/public key"
  github_com = "op://fixture/gh-com/public key"
  gitlab_com = "op://fixture/gl-com/public key"
  work_desktop = "op://fixture/wd/public key"
  wd_starship = "op://fixture/wd-starship/public key"
  wd_wl = "op://fixture/wd-wl/public key"
  work_laptop = "op://fixture/wl/public key"
  wl_starship = "op://fixture/wl-starship/public key"
  wl_wd = "op://fixture/wl-wd/public key"
  wl_wms = "op://fixture/wl-wms/public key"
