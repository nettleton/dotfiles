# Synthetic machine profile: work desktop (contains work username)
# SYNTHETIC DATA ONLY — mirrors the [data] shape .chezmoi.toml.tmpl produces;
# the §6 leak scanner scans these fixtures too. See TESTING.md §4.
destDir = "/tmp/chezmoi-render-dest"

[onepassword]
  command = "op" # resolved on PATH; tests prepend tests/stubbin

[data]
  targetname = "ah-acmeuser-m"
  personalpackages = false
  is_work_machine = true
  is_personal_machine = false
  is_wife_machine = false
  is_child_machine = false
  is_laptop = false
  starshipuser = "fixtureuser"
  nessieuser = "fixturespouse"

